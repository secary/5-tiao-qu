services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: five-tiao-qu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-five_tiao_qu}
      POSTGRES_USER: ${POSTGRES_USER:-five_tiao_qu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-five_tiao_qu_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-five_tiao_qu} -d ${POSTGRES_DB:-five_tiao_qu}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
